<header>

<main class="pl-3">

<h1 class="pt-5 pb-5">Recent Posts</h1>

    {% for post in posts.all %}
        <img src="{{ post.image.url }}" height=300 width=300 class="img-fluid" alt="">
        <a href="{% url 'post_details' post.id %}"><h2> {{ post.title }}</h2></a>
          <br/>
        <p>{{ post.get_summary }}</p>
          <br/>
        {{ post.date }}
    {% endfor %}

</main>
